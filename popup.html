<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Notes Everywhere</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="header">
    <span class="logo">📝</span>
    <div>
      <h1>Smart Notes</h1>
      <p class="subtitle">Notes stick to every page</p>
    </div>
  </div>

  <!-- Main action -->
  <button id="addNoteBtn" class="btn-primary">
    + Add Note to This Page
  </button>

  <!-- Info section -->
  <div class="info-box">
    <p>💡 <strong>Tips</strong></p>
    <ul>
      <li>Drag notes by their top bar</li>
      <li>Click dots to change color</li>
      <li>Notes auto-save as you type</li>
      <li>Notes return after refresh</li>
    </ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
